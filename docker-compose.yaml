version: '3.8'

services:
  ipfs-checker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: ipfs-checker
    restart: unless-stopped
    
    ports:
      - "3012:3012"
    
    environment:
      - NODE_ENV=production
      - PORT=3012
      - IPFS_GATEWAY_URL=${IPFS_GATEWAY_URL:-https://ipfs.io/ipfs/}
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL:-https://eth.llamarpc.com}
    
    volumes:
      - ipfs-data:/app/data
    
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3012/api/health', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ipfs-data:
    driver: local
